name: skala_attendance
description: SKALA LMS attendance helper for Android and iOS.
publish_to: none
version: 1.0.0+2007

environment:
  sdk: ^3.12.2

dependencies:
  app_links: ^7.2.1
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_local_notifications: ^22.0.1
  http: ^1.6.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/generated/app_icon.png
  image_path_ios: assets/icon/generated/app_icon_ios.png
  adaptive_icon_background: "#020B2E"
  adaptive_icon_foreground: assets/icon/generated/app_icon_foreground.png
  min_sdk_android: 24
  remove_alpha_ios: true
